# Integration-test profile - activated via @ActiveProfiles("test") on AbstractIntegrationTest.
# JDBC url/username/password come from the Testcontainers @ServiceConnection
# (ConnectionDetails take precedence over spring.datasource.*), so no datasource keys here.

# Fresh, deterministic schema per test context.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# Chatbot service base URL so ChatbotClientConfig can boot; no test actually calls it.
chatbot.service.url=http://localhost:8001

# Pin OTP rate-limit values the auth ITs were written against.
auth.reset-password.otp.max-attempts=3
auth.reset-password.otp.window-minutes=15
auth.reset-password.otp.expiry-minutes=8

# Backup ITs: write files to the OS temp dir and keep the scheduler inert.
# Set here (not @TestPropertySource) so every IT shares one context-cache key.
app.backup.dir=${java.io.tmpdir}/sep-backup-it
app.backup.scheduled-enabled=false
