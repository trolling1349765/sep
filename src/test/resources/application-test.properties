# Integration-test profile - activated via @ActiveProfiles("test") on AbstractIntegrationTest.
# JDBC url/username/password come from the Testcontainers @ServiceConnection
# (ConnectionDetails take precedence over spring.datasource.*), so no datasource keys here.

# Fresh, deterministic schema per test context.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# Chatbot service base URL so ChatbotClientConfig can boot; no test actually calls it.
chatbot.service.url=http://localhost:8001
