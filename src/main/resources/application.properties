# Server
server.port=${PORT:8080}
server.servlet.context-path=/capstone
spring.application.name=capstone

# Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Redis
spring.data.redis.timeout=2000ms

# JWT Configuration
jwt.secret=${JWT_SECRET:CHANGEME-256-bit-secret-key-for-jwt-signing-must-be-long}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept
cors.allow-credentials=true
cors.max-age=3600

# Login Rate Limiting
auth.rate-limit.max-attempts=5
auth.rate-limit.window-minutes=1

# Registration Rate Limiting
auth.rate-limit.register.max-attempts=3
auth.rate-limit.register.window-minutes=60

# Account Lock
auth.lock.max-failed-attempts=5
auth.lock.duration-minutes=15

# Password Policy
auth.password.min-length=8
auth.password.max-length=128
auth.password.change.max-attempts=5
auth.password.change.window-minutes=60

# HTTPS Enforcement
server.ssl.enabled=false

ocr.tessdata.path=./tessdata
ocr.language=vie

jwt.signerKey=${JWT_SIGNER_KEY:95zhN5sI4NDZ2wZ7l_d5Hcg0EE4AZ4T0Z9HkyA0Zajw}

# Profile m?c ??nh
spring.profiles.active=local
