server.port=8088
server.servlet.context-path=/capstone
spring.application.name=capstone

#DRIVER
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#DB
spring.datasource.url=jdbc:mysql://localhost:1435/test?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC

#ACCOUNT
spring.datasource.username=root
spring.datasource.password=123456

#CONFIG
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# JWT Configuration
jwt.secret=${JWT_SECRET:CHANGEME-256-bit-secret-key-for-jwt-signing-must-be-long}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept
cors.allow-credentials=true
cors.max-age=3600

# Login Rate Limiting
auth.rate-limit.max-attempts=5
auth.rate-limit.window-minutes=1

# Registration Rate Limiting
auth.rate-limit.register.max-attempts=3
auth.rate-limit.register.window-minutes=60

# Account Lock (BR-10: lock for 15 min after 5 consecutive failed attempts)
auth.lock.max-failed-attempts=5
auth.lock.duration-minutes=15

# Password Policy
auth.password.min-length=8
auth.password.max-length=128
auth.password.change.max-attempts=5
auth.password.change.window-minutes=60

# HTTPS Enforcement
server.ssl.enabled=false

ocr.tessdata.path=./tessdata
ocr.language=vie

